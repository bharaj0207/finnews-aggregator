name: Update Financial News

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/20 * * * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Next.js API Cron Route
        # Replace PROJECT_DOMAIN with your actual production domain
        run: |
          curl -X POST "https://${{ secrets.PROJECT_DOMAIN }}/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json" \
          --fail || echo "Failed to trigger cron, but continuing."
